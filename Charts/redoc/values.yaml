# Default values for redoc.
#
# This chart wraps the k8s-at-home common library chart (4.5.2) — any
# common-chart value (controller.replicas, podAnnotations, additional
# services/ingresses, etc.) may be set here as well.
# https://github.com/k8s-at-home/library-charts

image:
  # -- image repository
  repository: redocly/redoc
  # -- image tag (https://hub.docker.com/r/redocly/redoc/tags)
  tag: v2.5.3
  # -- image pull policy
  pullPolicy: IfNotPresent

# -- environment variables passed to the redoc container.
# See https://github.com/Redocly/redoc — the container renders the
# OpenAPI document referenced by SPEC_URL.
env:
  SPEC_URL: "https://petstore.swagger.io/v2/swagger.json"
  # PAGE_TITLE: "My API docs"
  # PAGE_FAVICON: "https://example.com/favicon.ico"
  # REDOC_OPTIONS: "hide-download-button"

# -- Configures service settings for the chart.
service:
  main:
    ports:
      http:
        port: 8008
        # redoc's nginx listens on 80 inside the container
        targetPort: 80

ingress:
  main:
    # -- Enable and configure ingress settings for the chart under this key.
    enabled: false
    # -- Ingress controller class (spec.ingressClassName).
    ingressClassName:  # "nginx"
    # -- No controller-specific annotations ship by default. Example for
    # kubernetes/ingress-nginx (CORS for serving docs to browser apps):
    annotations: {}
    #   nginx.ingress.kubernetes.io/enable-cors: "true"
    #   nginx.ingress.kubernetes.io/cors-allow-methods: "PUT, GET, POST, OPTIONS"
    #   nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
    hosts:
      - host: chart-example.local
        paths:
          - path: /
            pathType: Prefix
    tls: []
    #  - secretName: chart-example-tls
    #    hosts:
    #      - chart-example.local

httpRoute:
  # Expose redoc via Gateway API (HTTPRoute) instead of, or alongside,
  # classic Ingress. Requires the Gateway API CRDs (standard channel) and
  # an existing Gateway; this chart does NOT create a Gateway. Set
  # parentRefs to reference yours.
  enabled: false
  annotations: {}
  parentRefs: []
  #  - name: my-gateway
  #    namespace: my-gateway-namespace
  #    sectionName: http
  hostnames:
    - chart-example.local
  # Each rule's matches/filters render verbatim; backendRefs are
  # chart-owned (always the redoc Service on service.main.ports.http.port).
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
