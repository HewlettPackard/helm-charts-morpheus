# Default values for morpheus-worker.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

env:
  MORPHEUS_KEY: ""
  MORPHEUS_WORKER_KEY: ""
  MORPHEUS_URL: ""
  MORPHEUS_SELF_SIGNED: "false"

image:
  repository: morpheusdata/morpheus-worker
  # Defaults to the chart appVersion when empty. Available tags:
  # https://hub.docker.com/r/morpheusdata/morpheus-worker/tags
  tag: ""
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

podAnnotations: {}

worker:
  # Protocol the worker process listens on: http or https.
  # Drives the liveness/readiness probe scheme and which ingress
  # annotation examples apply. The listen port is configurable at the
  # app level; conventional ports are 8080 (http) and 8443 (https).
  # For HTTPS: set protocol: https, service.ports.targetPort: 8443,
  # and add your controller's backend-protocol annotation (see
  # ingress.annotations examples below).
  protocol: http

service:
  type: NodePort
  ports:
    port: 8080
    targetPort: 8080
    # nodePort: 30080   # optional; honored only when type is NodePort

livenessProbe:
  initialDelaySeconds: 5
  timeoutSeconds: 5
  periodSeconds: 10
  failureThreshold: 3

readinessProbe:
  initialDelaySeconds: 5
  timeoutSeconds: 5
  periodSeconds: 10
  failureThreshold: 3

ingress:
  enabled: false
  # Ingress controller class (spec.ingressClassName). Replaces the
  # deprecated kubernetes.io/ingress.class annotation.
  className: ""
  # No controller-specific annotations are shipped by default.
  # Uncomment the set matching YOUR controller. <fullname> below means
  # the rendered Service name (default: <release>-morpheus-worker).
  annotations: {}
  ## kubernetes/ingress-nginx (ingressClassName: nginx):
  # annotations:
  #   nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"   # only when worker.protocol=https
  #   nginx.ingress.kubernetes.io/forwarded-for-header: "X-Forwarded-For"
  #   nginx.ingress.kubernetes.io/x-forwarded-proto: "https"
  #   nginx.ingress.kubernetes.io/affinity: "cookie"
  #   nginx.ingress.kubernetes.io/affinity-mode: "persistent"
  #   nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"  # long-lived websocket sessions
  #   nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
  ## NGINX Inc. kubernetes-ingress (ingressClassName: nginx):
  # annotations:
  #   nginx.org/websocket-services: "<fullname>"              # MUST be the full Service name
  #   nginx.com/sticky-cookie-services: "serviceName=<fullname> srv_id expires=1h path=/"
  #   nginx.org/proxy-read-timeout: "3600"
  #   nginx.org/proxy-send-timeout: "3600"
  #   nginx.org/ssl-services: "<fullname>"                    # only when worker.protocol=https
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

httpRoute:
  # Expose the worker via Gateway API (HTTPRoute) instead of, or alongside,
  # classic Ingress. Requires the Gateway API CRDs (standard channel) and an
  # existing Gateway; this chart does NOT create a Gateway. Set parentRefs
  # to reference yours.
  enabled: false
  annotations: {}
  parentRefs: []
  #  - name: my-gateway
  #    namespace: my-gateway-namespace
  #    sectionName: http
  hostnames:
    - chart-example.local
  # Each rule's matches/filters render verbatim; backendRefs are chart-owned
  # (always the worker Service on service.ports.port).
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /

resources:
  limits:
    memory: "2Gi"
  requests:
    memory: "512Mi"

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}
