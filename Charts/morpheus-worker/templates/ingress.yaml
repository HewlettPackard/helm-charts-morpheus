{{- if .Values.ingress.enabled -}}
{{- /* 2.0.0 fail-fast guard: reject 1.x-era ingress values with a migration message. */ -}}
{{- if .Values.ingress.path }}
{{- fail "morpheus-worker 2.0.0: `ingress.path` was removed. Define paths per host under `ingress.hosts[].paths[]` with `path` and `pathType` (see values.yaml)." }}
{{- end }}
{{- if hasKey (default (dict) .Values.ingress.annotations) "kubernetes.io/ingress.class" }}
{{- fail "morpheus-worker 2.0.0: the `kubernetes.io/ingress.class` annotation was removed. Set `ingress.className` instead." }}
{{- end }}
{{- range .Values.ingress.hosts }}
{{- if not .paths }}
{{- fail (printf "morpheus-worker 2.0.0: ingress host %q has no `paths`. The 1.x host-only shape was removed; define `ingress.hosts[].paths[]` with `path` and `pathType` (see values.yaml)." (default "<unset>" .host)) }}
{{- end }}
{{- end }}
{{- $fullName := include "morpheus-worker.fullname" . -}}
{{- $svcPort := .Values.service.ports.port -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "morpheus-worker.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ $fullName }}
                port:
                  number: {{ $svcPort }}
          {{- end }}
    {{- end }}
{{- end }}
