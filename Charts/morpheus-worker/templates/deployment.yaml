apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "morpheus-worker.fullname" . }}
  labels:
    {{- include "morpheus-worker.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "morpheus-worker.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "morpheus-worker.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: worker
              containerPort: {{ .Values.service.ports.targetPort }}
              protocol: TCP
          env:
          - name: MORPHEUS_KEY
            value: {{ .Values.env.MORPHEUS_KEY | quote }}
          - name: MORPHEUS_WORKER_KEY
            value: {{ .Values.env.MORPHEUS_WORKER_KEY | quote }}
          - name: MORPHEUS_URL
            value: {{ .Values.env.MORPHEUS_URL | quote }}
          - name: MORPHEUS_SELF_SIGNED
            value: {{ .Values.env.MORPHEUS_SELF_SIGNED | quote }}
          livenessProbe:
            httpGet:
              path: /ping
              port: worker
              scheme: {{ .Values.worker.protocol | upper }}
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold }}
          readinessProbe:
            httpGet:
              path: /ping
              port: worker
              scheme: {{ .Values.worker.protocol | upper }}
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            timeoutSeconds: {{ .Values.readinessProbe.timeoutSeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
            failureThreshold: {{ .Values.readinessProbe.failureThreshold }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}